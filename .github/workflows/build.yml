name: Build EnglishLearningApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install aqtinstall
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall==3.2.* py7zr==0.22.*

    - name: Install Qt using aqtinstall
      run: |
        aqt install-qt windows desktop 6.8.2 win64_msvc2022_64 -m qtbase qtmultimedia qttexttospeech --outputdir $env:RUNNER_TEMP\qt
      shell: powershell

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Create build directory
      run: mkdir build
      shell: cmd

    - name: Configure CMake
      working-directory: build
      run: >
        cmake -S .. -B . 
        -DCMAKE_BUILD_TYPE=Release 
        -DCMAKE_PREFIX_PATH="${{ runner.temp }}\qt\6.8.2\msvc2022_64"
        -DQT_DEBUG_FIND_PACKAGE=ON
      shell: cmd

    - name: Build
      working-directory: build
      run: cmake --build . --config Release
      shell: cmd

    - name: Deploy dependencies with windeployqt
      working-directory: build/Release
      run: '%RUNNER_TEMP%\qt\6.8.2\msvc2022_64\bin\windeployqt.exe --release EnglishLearningApp.exe'
      shell: cmd

    - name: Set version variable
      id: version
      run: |
        if ("${{ github.event_name }}" -eq "release") {
          echo "VERSION=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "VERSION=latest" >> $env:GITHUB_OUTPUT
        }
      shell: powershell

    - name: Create ZIP
      working-directory: build/Release
      run: |
        $zipName = "EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip"
        Compress-Archive -Path ./* -DestinationPath $zipName -CompressionLevel Optimal
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnglishLearningApp_v${{ steps.version.outputs.VERSION }}
        path: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip
