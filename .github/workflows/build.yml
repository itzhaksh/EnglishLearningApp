name: Build EnglishLearningApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install aqtinstall
      run: |
        # Use the full path to the Python executable used by the install-qt-action
        $python_path = "C:\\hostedtoolcache\\windows\\Python\\3.12.10\\x64\\python.exe"  # ADJUST IF NECESSARY!
        & $python_path -m pip install aqtinstall==3.2.*

        # Verify that aqt is installed and accessible
        $aqt_path = Get-Command aqt -ErrorAction SilentlyContinue
        if ($aqt_path) {
          Write-Host "aqt installed successfully at $($aqt_path.Source)"
        } else {
          Write-Error "aqt installation failed.  Check the logs."
          exit 1
        }
      shell: powershell

    - name: Find aqt path
      id: find_aqt
      run: |
        # This will attempt to find the aqt executable and set the path as an output variable
        $aqt_path = Get-Command aqt -ErrorAction SilentlyContinue
        if ($aqt_path) {
          echo "AQT_PATH=$($aqt_path.Source)" >> $env:GITHUB_OUTPUT
          echo "AQT found at $($aqt_path.Source)"
        } else {
          echo "AQT not found.  Check the logs."
          exit 1 # Stop the workflow if aqt is not found
        }
      shell: powershell

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        dir: '${{ runner.temp }}/qt'
        modules: 'qtbase qtdeclarative qtmultimedia qttexttospeech'

    - name: List available Qt modules
      id: qt_modules
      run: |
        # Use the aqt path found in the previous step
        $aqt_path = "${{ steps.find_aqt.outputs.AQT_PATH }}"
        if (-not $aqt_path) {
          Write-Error "AQT_PATH is not set.  Something went wrong finding aqt."
          exit 1
        }

        # Capture and process the output from aqt list-qt
        $modules_output = & $aqt_path list-qt windows desktop --modules 6.8.2 win64_msvc2022_64

        # Ensure that the command executed successfully
        if ($LASTEXITCODE -ne 0) {
            Write-Error "aqt list-qt command failed with exit code $LASTEXITCODE"
            exit 1
        }

        # Capture all the output to AVAILABLE_MODULES (for debugging purposes).  You might want to log or examine this output.
        echo "AVAILABLE_MODULES=$modules_output" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Adjust Qt Modules (Manual Step - Inspect output of previous step)
      run: |
          Write-Host "Please examine the output of the 'List available Qt modules' step."
          Write-Host "Then adjust the 'Install Qt' step's modules list based on what's actually available."
          Write-Host "Workflow will continue, assuming the modules are now correct, but the build may fail if they aren't."
      shell: powershell

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Create build directory
      run: mkdir build
      shell: cmd

    - name: Configure CMake
      working-directory: build
      run: cmake -S .. -B . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ runner.temp }}/qt/6.8.2/win64_msvc2022_64"
      shell: cmd

    - name: Build
      working-directory: build
      run: cmake --build . --config Release
      shell: cmd

    - name: Deploy dependencies with windeployqt
      working-directory: build/Release
      run: ${{ runner.temp }}\qt\6.8.2\win64_msvc2022_64\bin\windeployqt --release EnglishLearningApp.exe
      shell: cmd

    - name: Set version variable
      id: version
      run: |
        if ("${{ github.event_name }}" -eq "release") {
          echo "VERSION=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "VERSION=latest" >> $env:GITHUB_OUTPUT
        }
      shell: powershell

    - name: Create ZIP
      working-directory: build/Release
      run: |
        $zipName = "EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip"
        if (Test-Path "C:\Program Files\7-Zip\7z.exe") {
          & "C:\Program Files\7-Zip\7z.exe" a $zipName ./* -mx9
        } else {
          Compress-Archive -Path ./* -DestinationPath $zipName -CompressionLevel Optimal
        }
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnglishLearningApp_v${{ steps.version.outputs.VERSION }}
        path: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip