name: Build EnglishLearningApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install aqtinstall
      run: |
        python -m pip install --upgrade pip
        python -m pip install aqtinstall==3.2.*
      shell: cmd

    - name: Configure aqtinstall settings
      run: |
        $aqt_settings_dir = "$env:APPDATA\aqt"
        New-Item -ItemType Directory -Force -Path $aqt_settings_dir
        $settings_content = @"
        [requests]
        max_retries_to_retrieve_hash = 10
        retry_backoff = 1.0
        timeout = 30
        [mirrors]
        trusted_mirrors = ["https://mirrors.ocf.berkeley.edu/qt/", "https://ftp.fau.de/qtproject/", "https://mirror.netcologne.de/qtproject/", "https://qt.mirror.constant.com/", "https://download.qt.io/"]
        "@
        Set-Content -Path "$aqt_settings_dir\settings.ini" -Value $settings_content
        Write-Host "aqtinstall settings configured"
      shell: powershell

    - name: Install Qt 6.8.2 (Fallback to aqt install)
      run: |
        python -m aqt install-qt windows desktop 6.8.2 win64_msvc2022_64 --outputdir ${{ runner.temp }}\qt --modules qtmultimedia qttexttospeech
      shell: cmd

    - name: Verify Qt Installation
      run: |
        $qtDir = "${{ runner.temp }}\qt\6.8.2\msvc2022_64"
        if (Test-Path $qtDir) {
          Write-Host "Qt installed successfully at: $qtDir"
          Get-ChildItem $qtDir -Name
        } else {
          Write-Error "Qt installation not found"
          exit 1
        }
      shell: powershell

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Create build directory
      run: mkdir build
      shell: cmd

    - name: Configure CMake
      working-directory: build
      run: |
        cmake -S .. -B . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ runner.temp }}\qt\6.8.2\msvc2022_64" -DQT_DEBUG_FIND_PACKAGE=ON
      shell: cmd

    - name: Build
      working-directory: build
      run: cmake --build . --config Release
      shell: cmd

    - name: Deploy Qt dependencies
      working-directory: build/Release
      run: |
        ${{ runner.temp }}\qt\6.8.2\msvc2022_64\bin\windeployqt.exe --release --no-translations --no-system-d3d-compiler --no-opengl-sw EnglishLearningApp.exe
      shell: cmd

    - name: Set version variable
      id: version
      run: |
        if ("${{ github.event_name }}" -eq "release") {
          echo "VERSION=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "VERSION=latest" >> $env:GITHUB_OUTPUT
        }
      shell: powershell

    - name: Create deployment package
      working-directory: build/Release
      run: |
        $zipName = "EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip"
        Compress-Archive -Path ./* -DestinationPath $zipName -CompressionLevel Optimal
        Write-Host "Created package: $zipName"
      shell: powershell

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnglishLearningApp_v${{ steps.version.outputs.VERSION }}
        path: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip
        retention-days: 30

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip
        fail_on_unmatched_files: true