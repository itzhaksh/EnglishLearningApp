name: Build EnglishLearningApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install aqtinstall and get its path
      id: install_aqt
      run: |
        # Define the base Python path based on your runner's environment
        $python_base_path = "C:\hostedtoolcache\windows\Python\3.12.10\x64"
        $python_exe_path = Join-Path $python_base_path "python.exe"
        $aqt_scripts_path = Join-Path $python_base_path "Scripts"
        $aqt_exe_path = Join-Path $aqt_scripts_path "aqt.exe"

        Write-Host "Installing aqtinstall using $python_exe_path"
        & $python_exe_path -m pip install aqtinstall==3.2.*

        # Verify that aqt.exe exists at the expected location
        if (Test-Path $aqt_exe_path) {
          Write-Host "aqt.exe found at $aqt_exe_path. Installation successful."
          # Set the full path to aqt.exe as an output variable for later steps
          echo "AQT_EXECUTABLE_PATH=$aqt_exe_path" >> $env:GITHUB_OUTPUT
        } else {
          Write-Error "aqt.exe not found at $aqt_exe_path after installation. Check pip logs for errors."
          exit 1
        }
      shell: powershell

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        dir: '${{ runner.temp }}/qt'
        modules: 'qtbase qtdeclarative qtmultimedia qttexttospeech' # <<< REMEMBER TO ADJUST THIS AFTER FIRST RUN!

    - name: List available Qt modules
      id: qt_modules
      run: |
        # Use the full path to aqt.exe found in the previous step
        $aqt_path = "${{ steps.install_aqt.outputs.AQT_EXECUTABLE_PATH }}"
        if (-not $aqt_path) {
          Write-Error "AQT_EXECUTABLE_PATH is not set. Something went wrong getting aqt path."
          exit 1
        }

        Write-Host "Listing Qt modules using $aqt_path"
        $modules_output = & $aqt_path list-qt windows desktop --modules 6.8.2 win64_msvc2022_64

        if ($LASTEXITCODE -ne 0) {
            Write-Error "aqt list-qt command failed with exit code $LASTEXITCODE"
            exit 1
        }

        # Output the list of modules for debugging
        echo "AVAILABLE_MODULES=$modules_output" >> $env:GITHUB_OUTPUT
        Write-Host "Available Modules Output:"
        Write-Host $modules_output
      shell: powershell

    - name: Adjust Qt Modules (Manual Action Required)
      run: |
          Write-Host "*************************************************************************"
          Write-Host "  ACTION REQUIRED: MANUAL ADJUSTMENT OF QT MODULES LIST                 "
          Write-Host "  Please review the 'Available Modules Output:' above.                  "
          Write-Host "  Then, edit this workflow file and update the 'modules' line in the    "
          Write-Host "  'Install Qt' step to include ONLY the modules that are actually available. "
          Write-Host "  For example, if 'qttexttospeech' is not listed, remove it.            "
          Write-Host "  After adjusting, re-run the workflow.                                 "
          Write-Host "*************************************************************************"
      shell: powershell

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Create build directory
      run: mkdir build
      shell: cmd

    - name: Configure CMake
      working-directory: build
      run: cmake -S .. -B . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ runner.temp }}/qt/6.8.2/win64_msvc2022_64"
      shell: cmd

    - name: Build
      working-directory: build
      run: cmake --build . --config Release
      shell: cmd

    - name: Deploy dependencies with windeployqt
      working-directory: build/Release
      run: ${{ runner.temp }}\qt\6.8.2\win64_msvc2022_64\bin\windeployqt --release EnglishLearningApp.exe
      shell: cmd

    - name: Set version variable
      id: version
      run: |
        if ("${{ github.event_name }}" -eq "release") {
          echo "VERSION=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "VERSION=latest" >> $env:GITHUB_OUTPUT
        }
      shell: powershell

    - name: Create ZIP
      working-directory: build/Release
      run: |
        $zipName = "EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip"
        if (Test-Path "C:\Program Files\7-Zip\7z.exe") {
          & "C:\Program Files\7-Zip\7z.exe" a $zipName ./* -mx9
        } else {
          Compress-Archive -Path ./* -DestinationPath $zipName -CompressionLevel Optimal
        }
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnglishLearningApp_v${{ steps.version.outputs.VERSION }}
        path: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip