name: Build EnglishLearningApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Python dependencies and aqtinstall
      run: |
        python -m pip install setuptools>=70.1.0 py7zr==0.22.* aqtinstall==3.2.*

    - name: Install Qt 6.8.2 for MSVC 2022 using aqtinstall
      run: |
        aqt install-qt windows desktop 6.8.2 win64_msvc2022_64 -O $env:RUNNER_TEMP\qt
      shell: pwsh

    - name: Configure with CMake
      run: |
        $env:Qt6_DIR = "$env:RUNNER_TEMP\qt\6.8.2\msvc2022_64"
        cmake -B build -S . -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
      shell: pwsh

    - name: Build
      run: cmake --build build --config Release
      shell: pwsh
