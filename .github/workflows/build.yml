name: Build EnglishLearningApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Ensure aqtinstall is installed
      id: find_aqt_exe
      run: |
        $python_base_path = "C:\hostedtoolcache\windows\Python\3.12.10\x64"
        $python_exe_path = Join-Path $python_base_path "python.exe"
        $aqt_scripts_dir = Join-Path $python_base_path "Scripts"
        $aqt_exe_path = Join-Path $aqt_scripts_dir "aqt.exe"
        Write-Host "Installing aqtinstall..."
        & $python_exe_path -m pip install setuptools>=70.1.0 py7zr==0.22.* aqtinstall==3.2.*
        if (Test-Path $aqt_exe_path) {
          Write-Host "aqt.exe found at $aqt_exe_path"
          echo "AQT_PATH=$aqt_exe_path" >> $env:GITHUB_OUTPUT
        } else {
          Write-Error "aqt.exe not found at $aqt_exe_path"
          exit 1
        }
      shell: powershell

    - name: Configure aqtinstall settings
      run: |
        $aqt_settings_dir = "$env:APPDATA\aqt"
        New-Item -ItemType Directory -Force -Path $aqt_settings_dir
        $settings_content = @"
        [requests]
        max_retries_to_retrieve_hash = 5
        [mirrors]
        trusted_mirrors = ["https://mirrors.ocf.berkeley.edu/qt/", "https://ftp.fau.de/qtproject/", "https://mirror.netcologne.de/qtproject/"]
        "@
        Set-Content -Path "$aqt_settings_dir\settings.ini" -Value $settings_content
        Write-Host "aqtinstall settings configured at $aqt_settings_dir\settings.ini"
      shell: powershell

    - name: Install Qt with Official Installer
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        dir: '${{ runner.temp }}/qt'
        modules: 'qtmultimedia qttexttospeech'
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Create build directory
      run: mkdir build
      shell: cmd

    - name: Configure CMake
      working-directory: build
      run: |
        cmake -S .. -B . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ runner.temp }}/qt/6.8.2/win64_msvc2022_64" -DQT_DEBUG_FIND_PACKAGE=ON
      shell: cmd

    - name: Debug Qt6TextToSpeech
      if: failure()
      working-directory: build
      run: |
        cmake -S .. -B . --debug-find-pkg=Qt6TextToSpeech
      shell: cmd

    - name: Build
      working-directory: build
      run: cmake --build . --config Release
      shell: cmd

    - name: Deploy dependencies with windeployqt
      working-directory: build/Release
      run: ${{ runner.temp }}\qt\6.8.2\win64_msvc2022_64\bin\windeployqt --release EnglishLearningApp.exe
      shell: cmd

    - name: Set version variable
      id: version
      run: |
        if ("${{ github.event_name }}" -eq "release") {
          echo "VERSION=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "VERSION=latest" >> $env:GITHUB_OUTPUT
        }
      shell: powershell

    - name: Create ZIP
      working-directory: build/Release
      run: |
        $zipName = "EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip"
        if (Test-Path "C:\Program Files\7-Zip\7z.exe") {
          & "C:\Program Files\7-Zip\7z.exe" a $zipName ./* -mx9
        } else {
          Compress-Archive -Path ./* -DestinationPath $zipName -CompressionLevel Optimal
        }
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnglishLearningApp_v${{ steps.version.outputs.VERSION }}
        path: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/EnglishLearningApp_v${{ steps.version.outputs.VERSION }}.zip